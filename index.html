<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Patroclo VR - Caminando</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.5.4/dist/aframe-extras.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #050b14;
      font-family: monospace;
    }

    #vr-btn {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      background: transparent;
      border: 2px solid #00ff88;
      color: #00ff88;
      font-size: 14px;
      letter-spacing: 3px;
      padding: 11px 30px;
      border-radius: 6px;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.35);
      transition: 0.2s ease;
    }

    #vr-btn:hover {
      background: #00ff88;
      color: #000;
    }

    #info {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 999;
      color: #d9fff0;
      background: rgba(0, 0, 0, 0.50);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
      max-width: 360px;
    }
  </style>
</head>
<body>

<div id="info">
  <strong>Controles:</strong><br>
  Flechas: mover personaje<br>
  + / - : escalar personaje<br>
  R: reiniciar<br>
  Espacio: pausar / reactivar caminar
</div>

<button id="vr-btn">▶ ENTRAR EN VR</button>

<a-scene
  id="scene"
  vr-mode-ui="enabled:false"
  renderer="antialias:true; colorManagement:true"
  background="color:#050c18">

  <a-assets timeout="30000">
    <a-asset-item id="modelo-entorno" src="Untitled.glb"></a-asset-item>
    <a-asset-item id="modelo-patroclo" src="animacionPatroclo.glb"></a-asset-item>
    <audio id="audio-fondo" src="Carrera-16-2.wav" preload="auto" crossorigin="anonymous"></audio>
  </a-assets>

  <a-entity id="rig">
    <a-camera position="0 1.6 8" look-controls wasd-controls="enabled:true"></a-camera>
  </a-entity>

  <!-- Entorno -->
  <a-entity
    id="entorno"
    gltf-model="#modelo-entorno"
    position="0 0 -14"
    scale="0.5 0.5 0.5"
    rotation="0 0 0">
  </a-entity>

  <!-- Personaje animado -->
  <a-entity
    id="patroclo"
    gltf-model="#modelo-patroclo"
    position="-2 0 -4"
    scale="1 1 1"
    rotation="0 90 0"
    animation-mixer="clip: *; loop: repeat; timeScale: 1">
  </a-entity>

  <a-entity id="lh" oculus-touch-controls="hand:left" laser-controls="hand:left"></a-entity>
  <a-entity id="rh" oculus-touch-controls="hand:right" laser-controls="hand:right"></a-entity>

  <a-light type="ambient" color="#ffffff" intensity="1.2"></a-light>
  <a-light type="directional" position="2 6 4" color="#dfefff" intensity="1.6"></a-light>
  <a-light type="point" position="0 4 -2" color="#00ff88" intensity="0.5" distance="12"></a-light>

  <a-plane position="0 0 -4" rotation="-90 0 0" width="30" height="30" color="#101820"></a-plane>
  <a-sky color="#050c18"></a-sky>
</a-scene>

<script>
  const scene = document.getElementById('scene');
  const patroclo = document.getElementById('patroclo');
  const vrBtn = document.getElementById('vr-btn');
  const audioElement = document.getElementById('audio-fondo');

  let audioStarted = false;
  let isWalking = true;
  let autoWalkId = null;

  let p = { x: -2, y: 0, z: -4 };
  let s = 1;
  let ry = 90;
  let walkDirection = 1;

  audioElement.loop = true;
  audioElement.volume = 0.7;

  function applyPosition() {
    patroclo.setAttribute('position', `${p.x.toFixed(2)} ${p.y.toFixed(2)} ${p.z.toFixed(2)}`);
  }

  function applyScale() {
    patroclo.setAttribute('scale', `${s} ${s} ${s}`);
  }

  function applyRotation() {
    patroclo.setAttribute('rotation', `0 ${ry} 0`);
  }

  function startAudio() {
    audioElement.play().then(() => {
      audioStarted = true;
    }).catch(err => {
      console.log('Error audio:', err);
    });
  }

  function updateFacingByDirection() {
    ry = walkDirection === 1 ? 90 : -90;
    applyRotation();
  }

  function startWalkAnimation() {
    patroclo.setAttribute('animation-mixer', 'clip: *; loop: repeat; timeScale: 1');
  }

  function stopWalkAnimation() {
    patroclo.setAttribute('animation-mixer', 'clip: *; loop: repeat; timeScale: 0');
  }

  function startAutoWalk() {
    startWalkAnimation();
    isWalking = true;

    if (autoWalkId) clearInterval(autoWalkId);

    autoWalkId = setInterval(() => {
      p.x += 0.03 * walkDirection;

      if (p.x >= 2) {
        p.x = 2;
        walkDirection = -1;
        updateFacingByDirection();
      }

      if (p.x <= -2) {
        p.x = -2;
        walkDirection = 1;
        updateFacingByDirection();
      }

      applyPosition();
    }, 50);
  }

  function stopAutoWalk() {
    if (autoWalkId) {
      clearInterval(autoWalkId);
      autoWalkId = null;
    }
    stopWalkAnimation();
    isWalking = false;
  }

  function toggleWalk() {
    if (isWalking) stopAutoWalk();
    else startAutoWalk();
  }

  function resetModel() {
    p = { x: -2, y: 0, z: -4 };
    s = 1;
    walkDirection = 1;
    updateFacingByDirection();
    applyPosition();
    applyScale();
    startAutoWalk();
  }

  patroclo.addEventListener('model-loaded', () => {
    console.log('animacionPatroclo.glb cargado');
  });

  patroclo.addEventListener('model-error', (e) => {
    console.log('Error cargando animacionPatroclo.glb', e);
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowUp') {
      p.z -= 0.2;
      applyPosition();
    }

    if (e.key === 'ArrowDown') {
      p.z += 0.2;
      applyPosition();
    }

    if (e.key === 'ArrowLeft') {
      p.x -= 0.2;
      walkDirection = -1;
      updateFacingByDirection();
      applyPosition();
    }

    if (e.key === 'ArrowRight') {
      p.x += 0.2;
      walkDirection = 1;
      updateFacingByDirection();
      applyPosition();
    }

    if (e.key === '+' || e.key === '=') {
      s = Math.min(s + 0.1, 5);
      applyScale();
    }

    if (e.key === '-') {
      s = Math.max(s - 0.1, 0.2);
      applyScale();
    }

    if (e.key === 'r' || e.key === 'R') {
      resetModel();
    }

    if (e.key === ' ') {
      e.preventDefault();
      toggleWalk();
    }
  });

  vrBtn.addEventListener('click', () => {
    startAudio();
    if (scene.is('vr-mode')) scene.exitVR();
    else scene.enterVR();
  });

  scene.addEventListener('enter-vr', () => {
    vrBtn.style.display = 'none';
    if (!audioStarted) startAudio();
  });

  scene.addEventListener('exit-vr', () => {
    vrBtn.style.display = 'block';
  });

  scene.addEventListener('loaded', () => {
    applyPosition();
    applyScale();
    updateFacingByDirection();
    startAutoWalk();
  });
</script>

</body>
</html>
