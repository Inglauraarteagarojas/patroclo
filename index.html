<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Patroclo VR - Meta Quest 3</title>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #050b14;
      font-family: monospace;
    }

    #vr-btn {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      background: transparent;
      border: 2px solid #00ff88;
      color: #00ff88;
      font-size: 14px;
      letter-spacing: 3px;
      padding: 11px 30px;
      border-radius: 6px;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.35);
      transition: 0.2s ease;
    }

    #vr-btn:hover {
      background: #00ff88;
      color: #000;
    }

    #info {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 999;
      color: #d9fff0;
      background: rgba(0, 0, 0, 0.45);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
      max-width: 320px;
    }
  </style>
</head>
<body>

<div id="info">
  <strong>Controles:</strong><br>
  Flechas: mover modelo<br>
  + / - : escalar<br>
  R: reiniciar<br>
  Espacio: pausar / activar giro
</div>

<button id="vr-btn">▶ ENTRAR EN VR</button>

<a-scene
  id="scene"
  vr-mode-ui="enabled:false"
  renderer="antialias:true; colorManagement:true"
  background="color:#050c18">

  <a-assets>
    <!-- Modelo -->
    <a-asset-item id="modelo-patroclo" src="patroclo.glb"></a-asset-item>

    <!-- Imagen de fondo -->
    <img id="imagen-fondo" src="foto.png" crossorigin="anonymous">

    <!-- Audio -->
    <audio id="audio-fondo" src="Carrera-16-2.wav" preload="auto" crossorigin="anonymous"></audio>
  </a-assets>

  <!-- Cámara -->
  <a-entity id="rig">
    <a-camera position="0 1.6 4.5" look-controls wasd-controls="enabled:true"></a-camera>
  </a-entity>

  <!-- Fondo atrás del modelo -->
  <a-plane
    id="fondo"
    position="0 2.4 -8"
    width="13"
    height="7"
    material="src:#imagen-fondo; shader:flat; side:double">
  </a-plane>

  <!-- Modelo 3D -->
  <a-entity
    id="plant"
    gltf-model="#modelo-patroclo"
    position="0 0.9 -2.5"
    scale="2 2 2"
    rotation="0 45 0"
    animation__spin="property: rotation; to: 0 405 0; loop: true; dur: 10000; easing: linear">
  </a-entity>

  <!-- Audio ambiente -->
  <a-entity
    id="soundEntity"
    sound="src:#audio-fondo; autoplay:false; loop:true; volume:0.7; positional:false">
  </a-entity>

  <!-- Controles VR -->
  <a-entity id="lh" oculus-touch-controls="hand:left" laser-controls="hand:left"></a-entity>
  <a-entity id="rh" oculus-touch-controls="hand:right" laser-controls="hand:right"></a-entity>

  <!-- Luces -->
  <a-light type="ambient" color="#ffffff" intensity="1.3"></a-light>
  <a-light type="directional" position="2 5 3" color="#c8deff" intensity="2"></a-light>
  <a-light type="point" position="0 3 -1" color="#00ff88" intensity="0.7" distance="8"></a-light>

  <!-- Piso -->
  <a-plane
    position="0 0 -3"
    rotation="-90 0 0"
    width="14"
    height="14"
    color="#101820">
  </a-plane>

  <!-- Cielo -->
  <a-sky color="#050c18"></a-sky>
</a-scene>

<script>
  const scene = document.getElementById('scene');
  const plant = document.getElementById('plant');
  const soundEntity = document.getElementById('soundEntity');
  const vrBtn = document.getElementById('vr-btn');

  let spinning = true;
  let audioStarted = false;

  let p = { x: 0, y: 0.9, z: -2.5 };
  let s = 2;
  let ry = 45;

  function applyPosition() {
    plant.setAttribute('position', `${p.x.toFixed(2)} ${p.y.toFixed(2)} ${p.z.toFixed(2)}`);
  }

  function applyScale() {
    plant.setAttribute('scale', `${s} ${s} ${s}`);
  }

  function applyRotation() {
    plant.setAttribute('rotation', `0 ${ry} 0`);
  }

  function toggleSpin() {
    spinning = !spinning;

    if (spinning) {
      plant.setAttribute(
        'animation__spin',
        'property: rotation; to: 0 405 0; loop: true; dur: 10000; easing: linear'
      );
    } else {
      plant.removeAttribute('animation__spin');
      applyRotation();
    }
  }

  function resetModel() {
    p = { x: 0, y: 0.9, z: -2.5 };
    s = 2;
    ry = 45;
    applyPosition();
    applyScale();
    applyRotation();
  }

  function startAudio() {
    if (!audioStarted && soundEntity.components.sound) {
      soundEntity.components.sound.playSound();
      audioStarted = true;
    }
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowUp') {
      p.z -= 0.12;
      applyPosition();
    }

    if (e.key === 'ArrowDown') {
      p.z += 0.12;
      applyPosition();
    }

    if (e.key === 'ArrowLeft') {
      p.x -= 0.12;
      applyPosition();
    }

    if (e.key === 'ArrowRight') {
      p.x += 0.12;
      applyPosition();
    }

    if (e.key === '+' || e.key === '=') {
      s = Math.min(s + 0.2, 7);
      applyScale();
    }

    if (e.key === '-') {
      s = Math.max(s - 0.2, 0.3);
      applyScale();
    }

    if (e.key === 'r' || e.key === 'R') {
      resetModel();
    }

    if (e.key === ' ') {
      e.preventDefault();
      toggleSpin();
    }
  });

  const R = document.getElementById('rh');
  R.addEventListener('abuttondown', () => {
    ry += 20;
    if (!spinning) applyRotation();
  });

  R.addEventListener('bbuttondown', () => {
    ry -= 20;
    if (!spinning) applyRotation();
  });

  R.addEventListener('triggerdown', () => {
    s = Math.min(s + 0.25, 7);
    applyScale();
  });

  R.addEventListener('thumbstickmoved', (e) => {
    const { x, y } = e.detail;
    if (Math.abs(x) > 0.3 || Math.abs(y) > 0.3) {
      p.z += y * -0.05;
      p.x += x * 0.05;
      applyPosition();
    }
  });

  const L = document.getElementById('lh');
  L.addEventListener('xbuttondown', () => {
    s = Math.max(s - 0.25, 0.3);
    applyScale();
  });

  L.addEventListener('ybuttondown', () => {
    resetModel();
  });

  L.addEventListener('triggerdown', () => {
    toggleSpin();
  });

  L.addEventListener('thumbstickmoved', (e) => {
    const { x, y } = e.detail;
    if (Math.abs(x) > 0.3 || Math.abs(y) > 0.3) {
      p.y += y * 0.05;
      p.x += x * 0.05;
      applyPosition();
    }
  });

  vrBtn.addEventListener('click', () => {
    startAudio();
    if (scene.is('vr-mode')) {
      scene.exitVR();
    } else {
      scene.enterVR();
    }
  });

  scene.addEventListener('enter-vr', () => {
    vrBtn.style.display = 'none';
    startAudio();
  });

  scene.addEventListener('exit-vr', () => {
    vrBtn.style.display = 'block';
  });

  scene.addEventListener('loaded', () => {
    applyPosition();
    applyScale();
    applyRotation();
  });
</script>

</body>
</html>
