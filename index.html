<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Planta VR - Meta Quest 3</title>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <style>
    body { margin:0; background:#050b14; overflow:hidden; }
    #vr-btn {
      position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
      z-index:999; background:transparent; border:2px solid #00ff88;
      color:#00ff88; font-family:monospace; font-size:14px;
      letter-spacing:4px; padding:11px 36px; border-radius:6px;
      cursor:pointer; box-shadow:0 0 20px #00ff8855; transition:all .2s;
    }
    #vr-btn:hover { background:#00ff88; color:#000; }
    /* Canvas solo para depuración — oculto */
    #c { display:none; }
  </style>
</head>
<body>
<button id="vr-btn">▶ ENTRAR EN VR</button>
<canvas id="c" width="1400" height="600"></canvas>

<a-scene id="scene" vr-mode-ui="enabled:false"
  background="color:#080f1c"
  renderer="antialias:true; colorManagement:true">

  <a-assets>
    <a-asset-item id="cafe-model" src="animacionPatroclo.glb"></a-asset-item>
    <canvas id="tex" width="1400" height="600"></canvas>
  </a-assets>

  <a-entity id="rig">
    <a-camera position="0 1.6 4.5" look-controls wasd-controls="enabled:true"></a-camera>
  </a-entity>

  <!-- Modelo -->
  <a-entity id="plant" gltf-model="#cafe-model"
    position="0 0.9 -2.5" scale="2 2 2" rotation="0 45 0"
    animation__spin="property:rotation;to:0 405 0;loop:true;dur:10000;easing:linear">
  </a-entity>

  <!-- Panel como plano con textura canvas -->
  <a-plane id="panel"
    position="0 3.5 -3.0"
    width="5.8" height="2.5"
    material="src:#tex; transparent:false">
  </a-plane>

  <!-- Controladores Quest 3 -->
  <a-entity id="lh" oculus-touch-controls="hand:left"  laser-controls="hand:left"></a-entity>
  <a-entity id="rh" oculus-touch-controls="hand:right" laser-controls="hand:right"></a-entity>

  <a-light type="ambient"     color="#1a2535" intensity="1.5"></a-light>
  <a-light type="directional" position="2 5 3" intensity="2.2" color="#c8deff"></a-light>
  <a-light type="point"       position="0 3 -1" color="#00ff88" intensity="0.7" distance="6"></a-light>
  <a-plane position="0 0 -3" rotation="-90 0 0" width="14" height="14" color="#070e0a"></a-plane>
  <a-sky color="#050c18"></a-sky>
</a-scene>

<script>
// ═══════════════════════════════════════════════
//   DIBUJA MANDOS REALISTAS EN CANVAS (TEXTURA)
// ═══════════════════════════════════════════════
function drawControllers() {
  const canvas = document.getElementById('tex');
  const W = canvas.width, H = canvas.height;
  const ctx = canvas.getContext('2d');

  // Fondo
  ctx.fillStyle = '#030c18';
  ctx.fillRect(0, 0, W, H);

  // Borde panel
  ctx.strokeStyle = '#00ff8855';
  ctx.lineWidth = 3;
  ctx.strokeRect(3, 3, W-6, H-6);

  // Título
  ctx.fillStyle = '#00ff88';
  ctx.font = 'bold 32px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('META QUEST 3  —  CONTROLES DEL MODELO', W/2, 50);

  ctx.strokeStyle = '#00ff8833';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(40,65); ctx.lineTo(W-40,65); ctx.stroke();

  // Dibujar mando izquierdo centrado en cx=370, cy=330
  drawQuestController(ctx, 370, 330, 'left');
  // Dibujar mando derecho centrado en cx=1030, cy=330
  drawQuestController(ctx, 1030, 330, 'right');

  // Etiquetas mando izquierdo
  const lblLeft = [
    { bx:370, by:165, tx:120, ty:120, col:'#00aaff', text:'JOYSTICK\nSubir/Bajar\nIzq/Der modelo' },
    { bx:460, by:260, tx:590, ty:190, col:'#ff4466', text:'Y — Reset\nposicion' },
    { bx:460, by:310, tx:590, ty:290, col:'#00aaff', text:'X — Reducir\ntamano' },
    { bx:310, by:205, tx:110, ty:210, col:'#ffffff', text:'TRIGGER\nPausar rotacion' },
    { bx:315, by:310, tx:110, ty:330, col:'#aaaaaa', text:'GRIP\nAgarrar modelo' },
  ];
  lblLeft.forEach(l => drawLabel(ctx, l));

  // Etiquetas mando derecho
  const lblRight = [
    { bx:1030, by:165, tx:1280, ty:120, col:'#00ff88', text:'JOYSTICK\nMover adelante\natras / lados' },
    { bx:940,  by:260, tx:810,  ty:190, col:'#00ff88', text:'A — Girar\nderecha' },
    { bx:940,  by:310, tx:810,  ty:295, col:'#ffcc00', text:'B — Girar\nizquierda' },
    { bx:1090, by:205, tx:1290, ty:210, col:'#ffffff', text:'TRIGGER\nAgrandar tamano' },
    { bx:1085, by:310, tx:1290, ty:330, col:'#aaaaaa', text:'GRIP\nAgarrar modelo' },
  ];
  lblRight.forEach(l => drawLabel(ctx, l));

  // Actualizar material A-Frame
  const panel = document.getElementById('panel');
  if (panel && panel.getObject3D('mesh')) {
    panel.getObject3D('mesh').material.map.needsUpdate = true;
  }
}

// ─────────────────────────────────────────────
// Dibuja un mando Quest 3 realista
// ─────────────────────────────────────────────
function drawQuestController(ctx, cx, cy, side) {
  ctx.save();
  ctx.translate(cx, cy);

  const isLeft = side === 'left';
  const flip = isLeft ? 1 : -1; // izq normal, der espejado

  // Sombra
  ctx.shadowColor = 'rgba(0,0,0,0.6)';
  ctx.shadowBlur = 18;
  ctx.shadowOffsetY = 8;

  // ── Aro exterior (halo superior) ──
  ctx.beginPath();
  ctx.ellipse(flip*10, -130, 115, 55, isLeft?-0.18:0.18, 0, Math.PI*2);
  ctx.fillStyle = '#d8dde8';
  ctx.fill();

  // Aro interior (hueco del halo)
  ctx.beginPath();
  ctx.ellipse(flip*10, -130, 88, 38, isLeft?-0.18:0.18, 0, Math.PI*2);
  ctx.fillStyle = '#1a2535';
  ctx.fill();

  // Cara superior del aro (parte oscura/negra)
  ctx.beginPath();
  ctx.ellipse(flip*10, -138, 112, 52, isLeft?-0.18:0.18, 0, Math.PI*2);
  ctx.fillStyle = '#1c2535';
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(flip*10, -138, 85, 36, isLeft?-0.18:0.18, 0, Math.PI*2);
  ctx.fillStyle = '#0f1a28';
  ctx.fill();

  ctx.shadowColor = 'transparent';

  // ── Cuerpo principal (mango) ──
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 12;
  ctx.beginPath();
  // Forma ovalada del cuerpo
  ctx.ellipse(flip*5, 30, 62, 105, isLeft?-0.08:0.08, 0, Math.PI*2);
  // Gradiente blanco-gris
  const gBody = ctx.createRadialGradient(flip*-15,0,10, flip*5,30,90);
  gBody.addColorStop(0, '#f0f4fa');
  gBody.addColorStop(0.5, '#d8dde8');
  gBody.addColorStop(1, '#b0b8c8');
  ctx.fillStyle = gBody;
  ctx.fill();
  ctx.shadowColor = 'transparent';

  // ── Grip inferior curvo ──
  ctx.beginPath();
  ctx.ellipse(flip*12, 128, 38, 55, isLeft?0.2:-0.2, 0, Math.PI*2);
  const gGrip = ctx.createRadialGradient(flip*5,115,5, flip*12,128,50);
  gGrip.addColorStop(0, '#dde2ee');
  gGrip.addColorStop(1, '#a8b0c0');
  ctx.fillStyle = gGrip;
  ctx.fill();

  // Botón trigger (parte frontal superior)
  ctx.beginPath();
  ctx.ellipse(flip*(-30), -60, 20, 10, isLeft?-0.5:0.5, 0, Math.PI*2);
  ctx.fillStyle = '#c0c8d8';
  ctx.fill();
  ctx.strokeStyle = '#9098a8';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Grip lateral (lado exterior)
  ctx.beginPath();
  ctx.ellipse(flip*(55), 20, 10, 28, isLeft?0.1:-0.1, 0, Math.PI*2);
  ctx.fillStyle = '#b8c0d0';
  ctx.fill();

  // ── Plataforma superior (área de botones — negra) ──
  ctx.beginPath();
  ctx.ellipse(flip*10, -90, 68, 32, isLeft?-0.12:0.12, 0, Math.PI*2);
  ctx.fillStyle = '#1e2a3a';
  ctx.fill();
  ctx.strokeStyle = '#2a3a4a';
  ctx.lineWidth = 1;
  ctx.stroke();

  // ── JOYSTICK (arriba-centro) ──
  const jx = flip*(-15), jy = -108;
  // Base
  ctx.beginPath(); ctx.ellipse(jx, jy, 22, 13, 0, 0, Math.PI*2);
  ctx.fillStyle = '#141e2e'; ctx.fill();
  // Stick
  ctx.beginPath(); ctx.ellipse(jx, jy-2, 14, 9, 0, 0, Math.PI*2);
  const gJ = ctx.createRadialGradient(jx-3,jy-4,1, jx,jy-2,12);
  gJ.addColorStop(0, '#3a5070');
  gJ.addColorStop(1, '#1a2a3a');
  ctx.fillStyle = gJ; ctx.fill();
  // Punto brillo
  ctx.beginPath(); ctx.arc(jx-4, jy-5, 3, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.15)'; ctx.fill();

  // ── BOTONES (lado opuesto al joystick) ──
  const bx = flip*(28), b1y = -110, b2y = -85;

  if (isLeft) {
    // Botón Y (arriba)
    drawButton(ctx, bx, b1y, 12, '#ff4466', 'Y');
    // Botón X (abajo)
    drawButton(ctx, bx, b2y, 12, '#00aaff', 'X');
  } else {
    // Botón B (arriba)
    drawButton(ctx, bx, b1y, 12, '#ffcc00', 'B');
    // Botón A (abajo)
    drawButton(ctx, bx, b2y, 12, '#00ff88', 'A');
  }

  // ── Botón Home/Menu (centro) ──
  ctx.beginPath(); ctx.arc(flip*4, -78, 6, 0, Math.PI*2);
  ctx.fillStyle = '#2a3a4a'; ctx.fill();
  ctx.strokeStyle = '#3a4a5a'; ctx.lineWidth=1; ctx.stroke();

  // ── Label LEFT/RIGHT ──
  ctx.fillStyle = '#1a3040';
  ctx.font = 'bold 18px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(isLeft ? 'LEFT' : 'RIGHT', 0, 205);

  ctx.restore();
}

function drawButton(ctx, x, y, r, color, label) {
  // Sombra botón
  ctx.beginPath(); ctx.arc(x, y+1, r, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fill();
  // Cuerpo
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
  const g = ctx.createRadialGradient(x-3,y-3,1, x,y,r);
  g.addColorStop(0, color + 'cc');
  g.addColorStop(1, color + '55');
  ctx.fillStyle = g; ctx.fill();
  ctx.strokeStyle = color + 'aa';
  ctx.lineWidth = 1.2; ctx.stroke();
  // Letra
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${r}px monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(label, x, y + r*0.38);
}

// ─────────────────────────────────────────────
// Dibuja etiqueta con línea apuntando al botón
// ─────────────────────────────────────────────
function drawLabel(ctx, { bx, by, tx, ty, col, text }) {
  // Línea
  ctx.beginPath();
  ctx.moveTo(bx, by);
  // Curva suave
  const mx = (bx + tx) / 2;
  ctx.bezierCurveTo(mx, by, mx, ty, tx, ty);
  ctx.strokeStyle = col + 'bb';
  ctx.lineWidth = 1.8;
  ctx.stroke();

  // Punto en el botón
  ctx.beginPath(); ctx.arc(bx, by, 5, 0, Math.PI*2);
  ctx.fillStyle = col; ctx.fill();

  // Fondo del texto
  const lines = text.split('\n');
  const fw = 160, fh = lines.length * 22 + 10;
  const isRight = tx > 700;
  const rx = isRight ? tx - 5 : tx - fw + 5;
  ctx.fillStyle = 'rgba(2,10,22,0.82)';
  roundRect(ctx, rx, ty - fh/2 - 4, fw, fh, 5);
  ctx.fill();
  ctx.strokeStyle = col + '44';
  ctx.lineWidth = 1;
  roundRect(ctx, rx, ty - fh/2 - 4, fw, fh, 5);
  ctx.stroke();

  // Texto
  ctx.fillStyle = col;
  ctx.font = 'bold 15px monospace';
  ctx.textAlign = isRight ? 'left' : 'right';
  lines.forEach((line, i) => {
    ctx.fillText(line, isRight ? rx+8 : rx+fw-8, ty - fh/2 + 18 + i*22);
  });
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.arcTo(x+w, y, x+w, y+r, r);
  ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
  ctx.lineTo(x+r, y+h); ctx.arcTo(x, y+h, x, y+h-r, r);
  ctx.lineTo(x, y+r); ctx.arcTo(x, y, x+r, y, r);
  ctx.closePath();
}

// ═══════════════════════════════════════════════
//   LÓGICA DE MOVIMIENTO DEL MODELO
// ═══════════════════════════════════════════════
const plant = document.getElementById('plant');
let spinning = true;
let p = {x:0, y:0.9, z:-2.5}, s=2, ry=45;

const applyP = () => plant.setAttribute('position', `${p.x.toFixed(2)} ${p.y.toFixed(2)} ${p.z.toFixed(2)}`);
const applyS = () => plant.setAttribute('scale',    `${s} ${s} ${s}`);

function toggleSpin() {
  spinning = !spinning;
  plant.setAttribute('animation__spin', spinning
    ? 'property:rotation;to:0 405 0;loop:true;dur:10000;easing:linear'
    : 'property:rotation;to:0 0 0;dur:1;loop:false');
}
function resetModel() {
  p={x:0,y:0.9,z:-2.5}; s=2; ry=45;
  applyP(); applyS(); if(!spinning) toggleSpin();
}

document.addEventListener('keydown', e => {
  if(e.key==='ArrowUp')    { p.z-=0.12; applyP(); }
  if(e.key==='ArrowDown')  { p.z+=0.12; applyP(); }
  if(e.key==='ArrowLeft')  { p.x-=0.12; applyP(); }
  if(e.key==='ArrowRight') { p.x+=0.12; applyP(); }
  if(e.key==='+'||e.key==='=') { s=Math.min(s+0.2,7); applyS(); }
  if(e.key==='-')              { s=Math.max(s-0.2,0.3); applyS(); }
  if(e.key==='PageUp')         { p.y+=0.12; applyP(); }
  if(e.key==='PageDown')       { p.y-=0.12; applyP(); }
  if(e.key==='r'||e.key==='R') resetModel();
  if(e.key===' ')              { e.preventDefault(); toggleSpin(); }
});

const R = document.getElementById('rh');
R.addEventListener('abuttondown', ()=>{ ry+=30; if(!spinning) plant.setAttribute('rotation',`0 ${ry} 0`); });
R.addEventListener('bbuttondown', ()=>{ ry-=30; if(!spinning) plant.setAttribute('rotation',`0 ${ry} 0`); });
R.addEventListener('triggerdown', ()=>{ s=Math.min(s+0.25,7); applyS(); });
R.addEventListener('thumbstickmoved', e=>{
  const{x,y}=e.detail;
  if(Math.abs(x)>.3||Math.abs(y)>.3){ p.z+=y*-.05; p.x+=x*.05; applyP(); }
});

const L = document.getElementById('lh');
L.addEventListener('xbuttondown', ()=>{ s=Math.max(s-0.25,0.3); applyS(); });
L.addEventListener('ybuttondown', ()=>{ resetModel(); });
L.addEventListener('triggerdown', ()=>{ toggleSpin(); });
L.addEventListener('thumbstickmoved', e=>{
  const{x,y}=e.detail;
  if(Math.abs(x)>.3||Math.abs(y)>.3){ p.y+=y*.05; p.x+=x*.05; applyP(); }
});

// VR button
document.getElementById('vr-btn').addEventListener('click', ()=>{
  const scene = document.getElementById('scene');
  scene.is('vr-mode') ? scene.exitVR() : scene.enterVR();
});
document.getElementById('scene').addEventListener('enter-vr', ()=> document.getElementById('vr-btn').style.display='none');
document.getElementById('scene').addEventListener('exit-vr',  ()=> document.getElementById('vr-btn').style.display='block');

// Dibujar cuando cargue la escena
document.getElementById('scene').addEventListener('loaded', ()=>{
  drawControllers();
});
</script>
</body>
</html>
